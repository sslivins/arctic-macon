name: native-tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  native-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S tests -B build-tests

      - name: Build
        run: cmake --build build-tests

      - name: Test
        run: ctest --test-dir build-tests --output-on-failure
